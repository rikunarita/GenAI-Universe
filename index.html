<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GenAI Universe — Architecture Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#030b15;--bg2:#060f1e;--surface:#0a1929;--surface2:#0e2236;
  --border:#1a3349;--border2:#234466;--border3:#2d5580;
  --cyan:#00d4ff;--cyan2:#00a8cc;--cyan3:rgba(0,212,255,.12);
  --purple:#a855f7;--purple2:#7c3aed;--purple3:rgba(168,85,247,.12);
  --orange:#f97316;--orange3:rgba(249,115,22,.12);
  --green:#4ade80;--green3:rgba(74,222,128,.1);
  --pink:#ec4899;--yellow:#fbbf24;--red:#f87171;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#506a84;--text4:#334d63;
  --ff-display:'Syne',sans-serif;--ff-body:'DM Sans',sans-serif;--ff-mono:'JetBrains Mono',monospace;
  --r4:4px;--r8:8px;--r12:12px;--r16:16px;
}
html{font-size:16px;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);height:100%;overflow:hidden;display:flex;flex-direction:column}
/* ══ HERO ═══════════════════════════════ */
.hero{position:relative;padding:18px 32px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(3,11,21,0)0%,transparent 100%);overflow:hidden;flex-shrink:0}
#bgCanvas{position:absolute;inset:0;width:100%;height:100%;opacity:.35;pointer-events:none}
.hero-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:24px}
.hero-left{display:flex;align-items:center;gap:20px}
.hero-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--cyan),var(--purple));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.hero-text h1{font-family:var(--ff-display);font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--cyan),var(--purple) 60%,var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.hero-text p{font-size:11px;color:var(--text3);font-family:var(--ff-mono);margin-top:2px;letter-spacing:.5px}
.hero-stats{display:flex;gap:24px}
.hstat{text-align:center}
.hstat-val{font-family:var(--ff-mono);font-size:18px;font-weight:600;color:var(--cyan);line-height:1}
.hstat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hero-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--green3);border:1px solid rgba(74,222,128,.3);border-radius:20px;font-family:var(--ff-mono);font-size:10px;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
/* ══ CATEGORY NAV ════════════════════════ */
.cat-nav{display:flex;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-btn{position:relative;padding:11px 16px;background:none;border:none;color:var(--text3);font-family:var(--ff-body);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:color .2s;display:flex;align-items:center;gap:6px}
.cat-btn:hover{color:var(--text2)}
.cat-btn.active{color:var(--cyan)}
.cat-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:2px 2px 0 0}
.cat-emoji{font-size:14px}
/* ══ MAIN LAYOUT ════════════════════════ */
.main{display:grid;grid-template-columns:230px 1fr 300px;flex:1;overflow:hidden;min-height:0}
/* ══ SIDEBAR ════════════════════════════ */
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-head{padding:14px 16px 10px;border-bottom:1px solid var(--border)}
.sb-head-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.sb-head-cat{font-family:var(--ff-display);font-size:15px;font-weight:700;color:var(--text);margin-top:4px}
.sb-section{padding:8px 0}
.sb-section-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);padding:4px 16px 2px}
.arch-item{display:flex;align-items:center;gap:10px;padding:7px 14px;cursor:pointer;transition:all .15s;border-radius:0;border-left:2px solid transparent;margin:1px 0}
.arch-item:hover{background:var(--surface2);border-left-color:var(--border2)}
.arch-item.active{background:rgba(0,212,255,.07);border-left-color:var(--cyan)}
.arch-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.arch-info{flex:1;min-width:0}
.arch-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.arch-item.active .arch-name{color:var(--cyan)}
.arch-sub{font-family:var(--ff-mono);font-size:9px;color:var(--text3);margin-top:1px}
.arch-tag{font-family:var(--ff-mono);font-size:8px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text3);flex-shrink:0}
.arch-tag.new{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.25);color:var(--green)}
.arch-tag.sota{background:rgba(249,115,22,.08);border-color:rgba(249,115,22,.25);color:var(--orange)}
/* ══ CANVAS AREA ════════════════════════ */
.canvas-area{position:relative;background:var(--bg);overflow:hidden;display:flex;flex-direction:column}
.canvas-toolbar{position:absolute;top:14px;left:14px;display:flex;gap:8px;z-index:10}
.toolbar-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;background:rgba(10,25,41,.9);border:1px solid var(--border2);border-radius:var(--r8);color:var(--text2);font-family:var(--ff-mono);font-size:10px;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px)}
.toolbar-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.toolbar-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.08)}
.canvas-step{position:absolute;top:14px;right:14px;background:rgba(10,25,41,.9);border:1px solid var(--border2);border-radius:var(--r8);padding:7px 12px;font-family:var(--ff-mono);font-size:10px;color:var(--text2);backdrop-filter:blur(8px);z-index:10;min-width:120px;text-align:right}
.step-label{color:var(--text3);font-size:9px}
.step-name{color:var(--orange);font-size:11px;font-weight:500;margin-top:2px}
.arch-canvas{flex:1;display:block;width:100%;min-height:0}
.canvas-legend{position:absolute;bottom:12px;left:14px;display:flex;flex-wrap:wrap;gap:8px;z-index:10}
.legend-item{display:flex;align-items:center;gap:5px;font-family:var(--ff-mono);font-size:9px;color:var(--text3);padding:3px 8px;background:rgba(10,25,41,.8);border-radius:4px;border:1px solid var(--border);backdrop-filter:blur(4px)}
.legend-dot{width:7px;height:7px;border-radius:2px}
.node-tooltip{position:absolute;background:rgba(10,25,41,.97);border:1px solid var(--border2);border-radius:var(--r12);padding:12px;max-width:220px;pointer-events:none;z-index:50;display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.tt-title{font-family:var(--ff-display);font-size:13px;font-weight:700;margin-bottom:6px}
.tt-desc{font-size:11px;color:var(--text2);line-height:1.6}
.tt-formula{font-family:var(--ff-mono);font-size:10px;color:var(--purple);background:rgba(168,85,247,.08);border-radius:4px;padding:4px 8px;margin-top:6px}
/* ══ DETAIL PANEL ════════════════════════ */
.detail-panel{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;display:flex;flex-direction:column}
.detail-panel::-webkit-scrollbar{width:3px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.dp-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.dp-cat{font-family:var(--ff-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.dp-name{font-family:var(--ff-display);font-size:18px;font-weight:800;color:var(--text);line-height:1.1}
.dp-year{font-family:var(--ff-mono);font-size:10px;color:var(--text3);margin-top:4px}
.dp-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.dp-badge{font-family:var(--ff-mono);font-size:9px;padding:2px 8px;border-radius:3px}
.dp-body{padding:16px;flex:1}
.dp-section{margin-bottom:20px}
.dp-section-title{font-family:var(--ff-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dp-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.dp-desc{font-size:12px;line-height:1.7;color:var(--text2)}
.formula-block{background:rgba(168,85,247,.06);border:1px solid rgba(168,85,247,.2);border-left:3px solid var(--purple);border-radius:var(--r8);padding:10px 12px;font-family:var(--ff-mono);font-size:11px;color:var(--purple);margin:6px 0;overflow-x:auto;line-height:1.6}
.inno-list{list-style:none}
.inno-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(26,51,73,.5);font-size:11px;color:var(--text2);line-height:1.5}
.inno-item:last-child{border-bottom:none}
.inno-icon{color:var(--cyan);flex-shrink:0;font-size:12px;margin-top:1px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:rgba(6,15,30,.6);border:1px solid var(--border);border-radius:var(--r8);padding:10px 12px}
.stat-val{font-family:var(--ff-mono);font-size:16px;font-weight:600;color:var(--cyan);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.models-list{display:flex;flex-wrap:wrap;gap:5px}
.model-chip{font-family:var(--ff-mono);font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text2)}
.model-chip.highlight{background:var(--cyan3);border-color:rgba(0,212,255,.3);color:var(--cyan)}
/* DEMO AREA */
.demo-area{background:rgba(6,15,30,.6);border:1px solid var(--border);border-radius:var(--r8);padding:12px;margin-top:6px}
.demo-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.demo-input-row{display:flex;gap:6px;margin-bottom:8px}
.demo-input{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r4);padding:6px 8px;color:var(--text);font-family:var(--ff-mono);font-size:10px;outline:none}
.demo-input:focus{border-color:var(--cyan)}
.demo-btn{padding:6px 10px;background:var(--cyan3);border:1px solid rgba(0,212,255,.3);border-radius:var(--r4);color:var(--cyan);font-family:var(--ff-mono);font-size:10px;cursor:pointer;white-space:nowrap;transition:all .2s}
.demo-btn:hover{background:rgba(0,212,255,.2)}
.demo-btn:disabled{opacity:.4;cursor:not-allowed}
.demo-output{min-height:50px;font-family:var(--ff-mono);font-size:11px;line-height:1.6;color:var(--text)}
.demo-tokens{display:flex;flex-wrap:wrap;gap:3px}
.token{padding:2px 6px;border-radius:3px;font-family:var(--ff-mono);font-size:11px;transition:all .3s}
.token.context{background:var(--cyan3);color:var(--cyan);border:1px solid rgba(0,212,255,.2)}
.token.generated{background:var(--purple3);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.token.current{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid var(--orange);animation:tpulse .4s ease}
@keyframes tpulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
/* DIFFUSION DEMO */
.diff-canvas{border-radius:var(--r8);border:1px solid var(--border)}
.diff-steps{display:flex;gap:4px;align-items:center;margin-top:8px;flex-wrap:wrap}
.diff-step-dot{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--ff-mono);font-size:8px;border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all .2s}
.diff-step-dot.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan3)}
.diff-step-dot.done{border-color:var(--green);color:var(--green);background:var(--green3)}
/* ATTENTION VIZ */
.attn-viz{overflow-x:auto}
.attn-table{border-collapse:collapse;font-family:var(--ff-mono);font-size:8px}
.attn-table th{padding:2px 6px;color:var(--text3);font-weight:400}
.attn-table td{width:20px;height:20px;border-radius:2px}
/* SCROLLBAR GLOBAL */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease forwards}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(200%)}}
</style>
</head>
<body>
<!-- HERO -->
<div class="hero">
  <canvas id="bgCanvas"></canvas>
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-logo">
        <div class="logo-icon">🧠</div>
        <div class="hero-text">
          <h1>GenAI Universe</h1>
          <p>// Interactive Architecture Explorer · v3.0</p>
        </div>
      </div>
    </div>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-val">8</div><div class="hstat-label">Categories</div></div>
      <div class="hstat"><div class="hstat-val">32</div><div class="hstat-label">Architectures</div></div>
      <div class="hstat"><div class="hstat-val">∞</div><div class="hstat-label">Interactive</div></div>
    </div>
    <div class="hero-right">
      <div class="live-badge"><div class="live-dot"></div>Live API Demo</div>
    </div>
  </div>
</div>
<!-- CATEGORY NAV -->
<nav class="cat-nav" id="catNav">
  <button class="cat-btn active" data-cat="text"><span class="cat-emoji">📝</span>Text Generation</button>
  <button class="cat-btn" data-cat="multimodal"><span class="cat-emoji">🖼️</span>Multimodal Text</button>
  <button class="cat-btn" data-cat="omni"><span class="cat-emoji">⚡</span>Omni Models</button>
  <button class="cat-btn" data-cat="image"><span class="cat-emoji">🎨</span>Image Generation</button>
  <button class="cat-btn" data-cat="video"><span class="cat-emoji">🎬</span>Video Generation</button>
  <button class="cat-btn" data-cat="audio"><span class="cat-emoji">🎵</span>Audio Generation</button>
  <button class="cat-btn" data-cat="realtime"><span class="cat-emoji">🎤</span>Real-time Conv.</button>
  <button class="cat-btn" data-cat="3d"><span class="cat-emoji">🌐</span>3D Generation</button>
</nav>
<!-- MAIN -->
<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-head-label">Architecture</div>
      <div class="sb-head-cat" id="sbCatName">Text Generation</div>
    </div>
    <div id="archList"></div>
  </aside>
  <!-- CANVAS AREA -->
  <div class="canvas-area">
    <div class="canvas-toolbar">
      <button class="toolbar-btn" id="playBtn" onclick="togglePlay()">▶ Animate</button>
      <button class="toolbar-btn" id="resetBtn" onclick="resetAnim()">↺ Reset</button>
    </div>
    <div class="canvas-step" id="stepIndicator">
      <div class="step-label">STEP</div>
      <div class="step-name" id="stepName">Ready</div>
    </div>
    <canvas class="arch-canvas" id="archCanvas"></canvas>
    <div class="canvas-legend" id="canvasLegend"></div>
    <div class="node-tooltip" id="nodeTooltip">
      <div class="tt-title" id="ttTitle"></div>
      <div class="tt-desc" id="ttDesc"></div>
      <div class="tt-formula" id="ttFormula" style="display:none"></div>
    </div>
  </div>
  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="dp-header">
      <div class="dp-cat" id="dpCat">TEXT GENERATION</div>
      <div class="dp-name" id="dpName">Decoder-only Transformer</div>
      <div class="dp-year" id="dpYear">Introduced: Vaswani et al. (2017) · Popularized: OpenAI GPT (2018)</div>
      <div class="dp-badges" id="dpBadges"></div>
    </div>
    <div class="dp-body" id="dpBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// ARCHITECTURE DATABASE
// ══════════════════════════════════════════════════════════════
const NODE_COLORS = {
  input:    { fill:'rgba(0,212,255,.1)',  stroke:'#00d4ff', text:'#00d4ff',  label:'Input' },
  embed:    { fill:'rgba(0,175,200,.1)',  stroke:'#00afc8', text:'#22d3ee',  label:'Embedding' },
  attention:{ fill:'rgba(168,85,247,.1)',stroke:'#a855f7', text:'#a855f7',  label:'Attention' },
  ffn:      { fill:'rgba(249,115,22,.1)', stroke:'#f97316', text:'#f97316',  label:'FFN' },
  norm:     { fill:'rgba(251,191,36,.08)',stroke:'#fbbf24', text:'#fbbf24',  label:'Norm' },
  output:   { fill:'rgba(74,222,128,.1)', stroke:'#4ade80', text:'#4ade80',  label:'Output' },
  special:  { fill:'rgba(248,113,113,.1)',stroke:'#f87171', text:'#f87171',  label:'Special' },
  codec:    { fill:'rgba(34,211,238,.1)', stroke:'#22d3ee', text:'#22d3ee',  label:'Codec' },
  latent:   { fill:'rgba(232,121,249,.1)',stroke:'#e879f9', text:'#e879f9',  label:'Latent' },
  block:    { fill:'rgba(14,34,54,.8)',   stroke:'#234466', text:'#94a3b8',  label:'Block' },
  pool:     { fill:'rgba(45,85,128,.15)', stroke:'#2d5580', text:'#7aa4c7',  label:'Pool' },
  merge:    { fill:'rgba(99,179,237,.1)', stroke:'#63b3ed', text:'#63b3ed',  label:'Merge' },
};

const ARCHS = {
  // ── TEXT GENERATION ─────────────────────────────────────────
  'gpt': {
    id:'gpt', name:'Decoder-only Transformer', short:'GPT / LLaMA', cat:'text',
    year:'Vaswani et al. 2017 · GPT 2018', badge:'Autoregressive',
    desc:`The dominant architecture for large language models. Uses stacked transformer decoder blocks with causal self-attention, ensuring each token can only attend to previous tokens. This enables autoregressive generation: predicting the next token given all preceding tokens. Residual connections and layer normalization stabilize training at scale.`,
    formula:'Attn(Q,K,V) = softmax(QKᵀ/√dₖ)V\nP(xₜ|x₁…xₜ₋₁) = softmax(WₒLN(x+Attn+FFN))',
    innovations:['Causal (masked) self-attention prevents future leakage','Multi-head attention captures diverse relationships','Pre-norm or post-norm layer normalization','Rotary (RoPE) or ALiBi positional embeddings','GQA (grouped query attention) reduces KV cache','SwiGLU/GeGLU activation improves FFN expressivity'],
    stats:{params:'7B–405B',layers:'32–128',heads:'32–128',ctx:'8K–1M+'},
    models:['GPT-4o','LLaMA 3','Claude 3.5','Gemini 1.5','Qwen2','Mistral','DeepSeek V3'],
    highlight:'GPT-4o',
    steps:['Input Tokenization','Token + Positional Embedding','Layer Norm','Multi-Head Self-Attention','Residual Add','Layer Norm 2','Feed-Forward Network','Residual Add','Linear + Softmax','Next Token Sample'],
    nodes:[
      {id:'inp',  label:'Input\nTokens',    type:'input',    x:18,  y:200, w:90, h:50, desc:'Raw text tokenized by BPE/SentencePiece into integer IDs.', formula:'x₀ = token_ids ∈ ℤⁿ'},
      {id:'emb',  label:'Embedding\n+PosEnc',type:'embed',   x:130, y:200, w:100,h:50, desc:'Each token ID mapped to a dense vector; positional info added via sinusoidal or learned/RoPE encoding.', formula:'e = WₑxₒSTokens + PE(pos)'},
      {id:'ln1',  label:'LayerNorm',         type:'norm',    x:260, y:145, w:90, h:36, desc:'Pre-norm: normalizes residual stream before attention.', formula:'LN(x)=(x−μ)/σ · γ+β'},
      {id:'mha',  label:'Multi-Head\nSelf-Attention', type:'attention', x:255, y:192, w:100,h:62, desc:'Each token queries all previous tokens. Multiple heads capture different relationship types.', formula:'MHA(x) = Concat(h₁…hₙ)Wₒ'},
      {id:'add1', label:'Residual\nAdd',     type:'merge',   x:260, y:272, w:90, h:36, desc:'Residual shortcut: output = x + Attn(LN(x)). Prevents gradient vanishing.'},

// RENDERER
// ══════════════════════════════════════════════════════════════
class ArchRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.arch = null;
    this.hovered = null;
    this.playing = false;
    this.stepIdx = -1;
    this.particles = [];
    this.animFrame = null;
    this.activeNodes = new Set();
    this.activeConns = new Set();
    this.nodeMap = {};
    this.VW = 820; this.VH = 540; // virtual coords
    this.scale = 1; this.ox = 0; this.oy = 0;
    this.resize();
    this.bindEvents();
    this.render();
  }

  resize() {
    const r = this.canvas.parentElement.getBoundingClientRect();
    this.W = r.width; this.H = r.height;
    this.canvas.width = this.W * this.dpr;
    this.canvas.height = this.H * this.dpr;
    this.canvas.style.width = this.W + 'px';
    this.canvas.style.height = this.H + 'px';
    this.ctx.scale(this.dpr, this.dpr);
    this.calcTransform();
    this.render();
  }

  calcTransform() {
    if (!this.arch) return;
    const pad = 40;
    const sx = (this.W - pad*2) / this.VW;
    const sy = (this.H - pad*2) / this.VH;
    this.scale = Math.min(sx, sy, 1.3);
    this.ox = (this.W - this.VW * this.scale) / 2;
    this.oy = (this.H - this.VH * this.scale) / 2;
  }

  setArch(arch) {
    this.arch = arch;
    this.hovered = null;
    this.activeNodes = new Set();
    this.activeConns = new Set();
    this.particles = [];
    this.stepIdx = -1;
    this.nodeMap = {};
    if (arch) arch.nodes.forEach(n => this.nodeMap[n.id] = n);
    this.calcTransform();
    this.render();
  }

  vx(x) { return this.ox + x * this.scale; }
  vy(y) { return this.oy + y * this.scale; }
  vs(s) { return s * this.scale; }

  screenToVirtual(sx, sy) {
    return { x: (sx - this.ox) / this.scale, y: (sy - this.oy) / this.scale };
  }

  hitTest(vx, vy) {
    if (!this.arch) return null;
    return this.arch.nodes.find(n =>
      vx >= n.x - 4 && vx <= n.x + n.w + 4 &&
      vy >= n.y - 4 && vy <= n.y + n.h + 4
    );
  }

  bindEvents() {
    this.canvas.addEventListener('mousemove', e => {
      const r = this.canvas.getBoundingClientRect();
      const { x, y } = this.screenToVirtual(e.clientX - r.left, e.clientY - r.top);
      const hit = this.hitTest(x, y);
      this.hovered = hit ? hit.id : null;
      this.canvas.style.cursor = hit ? 'pointer' : 'default';
      const tt = document.getElementById('nodeTooltip');
      if (hit && hit.desc) {
        document.getElementById('ttTitle').textContent = hit.label.replace('\n', ' ');
        document.getElementById('ttDesc').textContent = hit.desc;
        const tf = document.getElementById('ttFormula');
        if (hit.formula) { tf.textContent = hit.formula; tf.style.display = 'block'; }
        else tf.style.display = 'none';
        const vx = this.vx(hit.x + hit.w + 10);
        const vy = this.vy(hit.y);
        const tx = Math.min(vx, this.W - 240);
        tt.style.left = tx + 'px';
        tt.style.top = Math.max(10, vy - 10) + 'px';
        tt.style.display = 'block';
        // Color title by type
        const c = NODE_COLORS[hit.type];
        document.getElementById('ttTitle').style.color = c ? c.text : '#e2e8f0';
      } else {
        tt.style.display = 'none';
      }
      this.render();
    });
    this.canvas.addEventListener('mouseleave', () => {
      this.hovered = null;
      document.getElementById('nodeTooltip').style.display = 'none';
      this.render();
    });
  }

  drawRoundRect(x, y, w, h, r) {
    const ctx = this.ctx;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  drawNode(n) {
    const ctx = this.ctx;
    const c = NODE_COLORS[n.type] || NODE_COLORS.block;
    const isHov = this.hovered === n.id;
    const isActive = this.activeNodes.has(n.id);
    const x = this.vx(n.x), y = this.vy(n.y);
    const w = this.vs(n.w), h = this.vs(n.h);
    const r = this.vs(8);

    ctx.save();
    if (isActive) {
      ctx.shadowColor = c.stroke;
      ctx.shadowBlur = 18;
    }

    this.drawRoundRect(x, y, w, h, r);
    if (isHov) ctx.fillStyle = c.fill.replace(/[\d.]+\)$/, '0.22)');
    else ctx.fillStyle = c.fill;
    ctx.fill();

    ctx.lineWidth = isActive ? 2 : (isHov ? 1.5 : 1);
    ctx.strokeStyle = isActive ? c.stroke : (isHov ? c.stroke : c.stroke + '88');
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Label
    const lines = n.label.split('\n');
    const fontSize = Math.max(9, Math.min(13, this.vs(11.5)));
    ctx.fillStyle = c.text;
    ctx.font = `500 ${fontSize}px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lineH = fontSize * 1.4;
    const startY = y + h/2 - (lines.length-1) * lineH/2;
    lines.forEach((line, i) => {
      ctx.fillText(line, x + w/2, startY + i * lineH);
    });

    // Sub-label
    if (n.sub) {
      ctx.font = `300 ${Math.max(8, fontSize-3)}px 'JetBrains Mono', monospace`;
      ctx.fillStyle = c.text + '88';
      ctx.fillText(n.sub, x + w/2, y + h - this.vs(8));
    }

    ctx.restore();
  }

  getNodeCenter(n) {
    return { x: this.vx(n.x + n.w/2), y: this.vy(n.y + n.h/2) };
  }

  getNodeEdge(n, side) {
    if (side === 'right') return { x: this.vx(n.x + n.w), y: this.vy(n.y + n.h/2) };
    if (side === 'left')  return { x: this.vx(n.x),       y: this.vy(n.y + n.h/2) };
    if (side === 'bottom')return { x: this.vx(n.x + n.w/2), y: this.vy(n.y + n.h) };
    if (side === 'top')   return { x: this.vx(n.x + n.w/2), y: this.vy(n.y) };
    return this.getNodeCenter(n);
  }

  bestEdges(a, b) {
    const ac = this.getNodeCenter(a), bc = this.getNodeCenter(b);
    const dx = bc.x - ac.x, dy = bc.y - ac.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      return [dx > 0 ? this.getNodeEdge(a,'right') : this.getNodeEdge(a,'left'),
              dx > 0 ? this.getNodeEdge(b,'left')  : this.getNodeEdge(b,'right')];
    } else {
      return [dy > 0 ? this.getNodeEdge(a,'bottom') : this.getNodeEdge(a,'top'),
              dy > 0 ? this.getNodeEdge(b,'top')    : this.getNodeEdge(b,'bottom')];
    }
  }

  drawConn(conn, isActive) {
    if (!this.arch) return;
    const a = this.nodeMap[conn.f], b = this.nodeMap[conn.t];
    if (!a || !b) return;
    const ctx = this.ctx;
    const [from, to] = this.bestEdges(a, b);
    const dx = to.x - from.x, dy = to.y - from.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    ctx.save();
    ctx.strokeStyle = isActive ? '#00d4ff' : (conn.dash ? '#2d5580' : '#1e3a5f');
    ctx.lineWidth = isActive ? 2 : 1;
    if (conn.dash) ctx.setLineDash([4, 5]);
    ctx.globalAlpha = isActive ? 1 : 0.7;

    const cx1 = from.x + dx * 0.4;
    const cy1 = from.y;
    const cx2 = to.x - dx * 0.4;
    const cy2 = to.y;

    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    if (conn.style === 'cross') {
      ctx.bezierCurveTo(from.x + this.vs(40), from.y, to.x - this.vs(40), to.y, to.x, to.y);
    } else {
      ctx.bezierCurveTo(cx1, cy1, cx2, cy2, to.x, to.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);

    // Arrowhead
    const ang = Math.atan2(to.y - cy2, to.x - cx2);
    const as = this.vs(7);
    ctx.fillStyle = ctx.strokeStyle;
    ctx.globalAlpha = isActive ? 1 : 0.7;
    ctx.beginPath();
    ctx.moveTo(to.x, to.y);
    ctx.lineTo(to.x - as*Math.cos(ang-0.4), to.y - as*Math.sin(ang-0.4));
    ctx.lineTo(to.x - as*Math.cos(ang+0.4), to.y - as*Math.sin(ang+0.4));
    ctx.fill();

    // Label
    if (conn.label && isActive) {
      const mx = (from.x + to.x)/2, my = (from.y + to.y)/2;
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = '#94a3b8';
      ctx.font = `${this.vs(9)}px 'JetBrains Mono', monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(conn.label, mx, my - this.vs(8));
    }

    ctx.restore();
  }

  spawnParticle(fromNode, toNode) {
    const [from, to] = this.bestEdges(fromNode, toNode);
    this.particles.push({ fx:from.x, fy:from.y, tx:to.x, ty:to.y, t:0, speed: 0.015 + Math.random()*0.01 });
  }

  drawParticle(p) {
    const ctx = this.ctx;
    const t = p.t;
    const x = p.fx + (p.tx - p.fx) * t;
    const y = p.fy + (p.ty - p.fy) * t;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, this.vs(6));
    grad.addColorStop(0, 'rgba(0,212,255,0.9)');
    grad.addColorStop(1, 'rgba(0,212,255,0)');
    ctx.beginPath();
    ctx.arc(x, y, this.vs(5), 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.W, this.H);
    if (!this.arch) {
      ctx.fillStyle = '#334d63';
      ctx.font = "14px 'DM Sans', sans-serif";
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Select an architecture', this.W/2, this.H/2);
      return;
    }
    // Draw connections
    this.arch.conns.forEach(c => this.drawConn(c, this.activeConns.has(c.f+'>'+c.t)));
    // Draw nodes
    this.arch.nodes.forEach(n => this.drawNode(n));
    // Draw particles
    this.particles.forEach(p => this.drawParticle(p));
    // Draw bracket for repeated block
    if (this.arch.nodes.some(n => n.label.includes('×N') || n.label.includes('×n'))) {
      this.drawRepeatBracket();
    }
  }

  drawRepeatBracket() {
    const ns = this.arch.nodes.filter(n => n.label.includes('×N') || n.label.includes('×n') || (n.id.includes('ln') || n.id.includes('mha') || n.id.includes('ffn') || n.id.includes('add')));
    if (ns.length < 2) return;
    const minX = Math.min(...ns.map(n=>n.x));
    const maxX = Math.max(...ns.map(n=>n.x+n.w));
    const minY = Math.min(...ns.map(n=>n.y));
    const maxY = Math.max(...ns.map(n=>n.y+n.h));
    const ctx = this.ctx;
    const pad = this.vs(12);
    const x1 = this.vx(minX) - pad, y1 = this.vy(minY) - pad;
    const x2 = this.vx(maxX) + pad, y2 = this.vy(maxY) + pad;
    ctx.save();
    ctx.strokeStyle = '#234466';
    ctx.lineWidth = 1;
    ctx.setLineDash([6,4]);
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,212,255,0.55)';
    ctx.font = `${this.vs(10)}px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText('×N layers', x2 - this.vs(4), y1 + this.vs(4));
    ctx.restore();
  }

  stepForward() {
    if (!this.arch || !this.arch.steps) return;
    this.stepIdx = (this.stepIdx + 1) % this.arch.steps.length;
    const step = this.arch.steps[this.stepIdx];
    document.getElementById('stepName').textContent = step;
    // Highlight relevant nodes and connections
    this.activeNodes = new Set();
    this.activeConns = new Set();
    const frac = this.stepIdx / this.arch.steps.length;
    const nodesPerStep = Math.ceil(this.arch.nodes.length / this.arch.steps.length);
    const startN = this.stepIdx * nodesPerStep;
    for (let i = startN; i < Math.min(startN + nodesPerStep, this.arch.nodes.length); i++) {
      this.activeNodes.add(this.arch.nodes[i].id);
    }
    // Also spawn particles on active connections
    if (this.stepIdx > 0) {
      const prevNode = this.arch.nodes[Math.max(0, startN-1)];
      const currNode = this.arch.nodes[startN];
      if (prevNode && currNode) {
        this.arch.conns.forEach(c => {
          if (c.f === prevNode.id) {
            this.activeConns.add(c.f+'>'+c.t);
            const b = this.nodeMap[c.t];
            if (b) this.spawnParticle(prevNode, b);
          }
        });
      }
    }
    this.render();
  }

  startAnimation() {
    this.playing = true;
    const tick = () => {
      if (!this.playing) return;
      // Update particles
      this.particles = this.particles.filter(p => { p.t += p.speed; return p.t < 1.05; });
      this.render();
      this.animFrame = requestAnimationFrame(tick);
    };
    this.animFrame = requestAnimationFrame(tick);
    // Step through at intervals
    this._stepTimer = setInterval(() => {
      if (!this.playing) { clearInterval(this._stepTimer); return; }
      this.stepForward();
    }, 1200);
  }

  stopAnimation() {
    this.playing = false;
    if (this.animFrame) cancelAnimationFrame(this.animFrame);
    if (this._stepTimer) clearInterval(this._stepTimer);
    this.particles = [];
    this.render();
  }

  reset() {
    this.stopAnimation();
    this.activeNodes = new Set();
    this.activeConns = new Set();
    this.stepIdx = -1;
    document.getElementById('stepName').textContent = 'Ready';
    this.render();
  }
}

// HERO BACKGROUND
// ══════════════════════════════════════════════════════════════
function initHeroBg() {
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let W, H, nodes, edges;

  function setup() {
    W = c.offsetWidth; H = c.offsetHeight;
    c.width = W * 2; c.height = H * 2;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    ctx.scale(2, 2);
    nodes = Array.from({length: 40}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4,
      r: Math.random()*2+1,
      color: Math.random() < .5 ? '#00d4ff' : '#a855f7'
    }));
    edges = [];
    for (let i = 0; i < nodes.length; i++)
      for (let j = i+1; j < nodes.length; j++) {
        const d = Math.hypot(nodes[i].x-nodes[j].x, nodes[i].y-nodes[j].y);
        if (d < 120) edges.push([i,j,d]);
      }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    edges.forEach(([i,j,d]) => {
      const a = nodes[i], b = nodes[j];
      const dist = Math.hypot(a.x-b.x, a.y-b.y);
      const alpha = (1 - dist/150) * 0.3;
      if (alpha <= 0) return;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = `rgba(0,212,255,${alpha})`;
      ctx.lineWidth = .5;
      ctx.stroke();
    });
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = n.color + 'cc';
      ctx.fill();
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });
    requestAnimationFrame(draw);
  }

  setup();
  draw();
  window.addEventListener('resize', setup);
}

// LIVE TEXT DEMO
// ══════════════════════════════════════════════════════════════
async function runTextDemo() {
  const prompt = document.getElementById('demoPrompt')?.value || '';
  const btn = document.getElementById('demoBtn');
  const container = document.getElementById('demoTokens');
  if (!btn || !container) return;
  btn.disabled = true;
  btn.textContent = '⏳';
  container.innerHTML = '';

  // Show context tokens
  const contextWords = prompt.trim().split(/\s+/);
  contextWords.forEach(w => {
    const span = document.createElement('span');
    span.className = 'token context';
    span.textContent = w;
    container.appendChild(span);
  });

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 80,
        stream: true,
        system: 'You are demonstrating transformer text generation. Continue the given text naturally in 1-2 sentences. Be concise.',
        messages: [{ role: 'user', content: `Continue this text: "${prompt}"` }]
      })
    });

    if (!resp.ok) throw new Error('API error');
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let wordBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') break;
        try {
          const ev = JSON.parse(data);
          const text = ev?.delta?.text || '';
          if (!text) continue;
          wordBuffer += text;
          // Split on spaces and show tokens
          while (wordBuffer.includes(' ')) {
            const idx = wordBuffer.indexOf(' ');
            const word = wordBuffer.slice(0, idx);
            wordBuffer = wordBuffer.slice(idx + 1);
            if (word.trim()) showToken(word, container);
          }
        } catch(e) {}
      }
    }
    if (wordBuffer.trim()) showToken(wordBuffer, container);
  } catch(err) {
    // Fallback: simulate
    const words = ['are','emerging','at','an','unprecedented','pace,','transforming','how','we','build','intelligent','systems.'];
    for (const w of words) {
      await new Promise(r => setTimeout(r, 180 + Math.random()*120));
      showToken(w, container);
    }
  }

  btn.disabled = false;
  btn.textContent = '▶ Run';
}

function showToken(word, container) {
  const prev = container.querySelector('.current');
  if (prev) { prev.classList.remove('current'); prev.classList.add('generated'); }
  const span = document.createElement('span');
  span.className = 'token current';
  span.textContent = word;
  container.appendChild(span);
  container.scrollTop = container.scrollHeight;
}

// ══════════════════════════════════════════════════════════════
// DIFFUSION DEMO
// ══════════════════════════════════════════════════════════════
let diffStep = 0;
const DIFF_STEPS_N = 10;

function initDiffusionDemo() {
  const c = document.getElementById('diffCanvas');
  if (!c) return;
  const stepsEl = document.getElementById('diffSteps');
  stepsEl.innerHTML = '';
  for (let i = 0; i < DIFF_STEPS_N; i++) {
    const d = document.createElement('div');
    d.className = 'diff-step-dot';
    d.textContent = `T${DIFF_STEPS_N-i}`;
    d.dataset.step = i;
    d.addEventListener('click', () => { diffStep = i; drawDiffStep(); });
    stepsEl.appendChild(d);
    if (i < DIFF_STEPS_N-1) stepsEl.innerHTML += '<span class="diff-arrow">→</span>';
  }
  drawDiffStep();
}

function drawDiffStep() {
  const c = document.getElementById('diffCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0, 0, W, H);
  const noiseLevel = 1 - diffStep / (DIFF_STEPS_N - 1);
  // Draw a simple image with noise overlay
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, `rgba(0,${Math.floor(100*(1-noiseLevel))},${Math.floor(200*(1-noiseLevel))},1)`);
  grad.addColorStop(1, `rgba(${Math.floor(150*(1-noiseLevel))},0,${Math.floor(255*(1-noiseLevel))},1)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // Noise overlay
  const imgData = ctx.getImageData(0, 0, W, H);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const n = (Math.random() - 0.5) * 255 * noiseLevel;
    imgData.data[i]   = Math.max(0, Math.min(255, imgData.data[i]   + n));
    imgData.data[i+1] = Math.max(0, Math.min(255, imgData.data[i+1] + n));
    imgData.data[i+2] = Math.max(0, Math.min(255, imgData.data[i+2] + n));
  }
  ctx.putImageData(imgData, 0, 0);
  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'center';
  ctx.fillText(`t=${DIFF_STEPS_N - diffStep}  noise=${(noiseLevel*100).toFixed(0)}%`, W/2, H-6);
  // Update dots
  document.querySelectorAll('.diff-step-dot').forEach((d, i) => {
    d.className = 'diff-step-dot' + (i === diffStep ? ' active' : i < diffStep ? ' done' : '');
  });
}

async function animateDiffusion() {
  diffStep = 0;
  for (let i = 0; i < DIFF_STEPS_N; i++) {
    diffStep = i;
    drawDiffStep();
    await new Promise(r => setTimeout(r, 280));
  }
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initHeroBg();
  renderer = new ArchRenderer(document.getElementById('archCanvas'));

  // Category nav
  document.getElementById('catNav').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    const cat = btn.dataset.cat;
    if (cat === currentCat) return;
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
    currentArchId = CATEGORIES[cat].archs[0];
    renderSidebar();
    selectArch(currentArchId);
  });

  // Resize
  window.addEventListener('resize', () => { renderer.resize(); });

  // Initial render
  renderSidebar();
  selectArch(currentArchId);
});
</script>
